name: "OpenLex Law Sync"
description: "Sync legal texts from GII, EUR-Lex, and other sources into Markdown"
branding:
  icon: "book-open"
  color: "purple"

inputs:
  deploy-hook:
    description: "Vercel Deploy Hook URL — triggers a redeploy after sync (optional)"
    required: false
  gii-proxy-url:
    description: "Proxy URL for gesetze-im-internet.de (bypasses IP blocking on GitHub Actions)"
    required: false
  gii-proxy-token:
    description: "Bearer token for the GII proxy"
    required: false

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: "22"

    # Clone the lawsync tool, build from source, and run against the current repo.
    # This avoids needing an npm publish — always uses the latest code.
    - name: Build & run sync
      id: sync
      shell: bash
      env:
        GII_PROXY_URL: ${{ inputs.gii-proxy-url }}
        GII_PROXY_TOKEN: ${{ inputs.gii-proxy-token }}
      run: |
        # Clone lawsync tool into a temp directory
        SYNC_DIR=$(mktemp -d)
        git clone --depth 1 https://github.com/openlex-project/openlex-lawsync.git "$SYNC_DIR"
        cd "$SYNC_DIR" && npm ci && npm run build

        # Run the CLI against the law repo (current working directory)
        cd "$GITHUB_WORKSPACE"
        node "$SYNC_DIR/dist/cli.js" | tee /tmp/sync-output.txt

        # Extract changed law slugs from output (for per-law tagging)
        CHANGED=$(grep -B20 "provisions, [1-9]" /tmp/sync-output.txt | grep "Syncing " | sed 's/.*Syncing \([^ ]*\).*/\1/' | tr '\n' ' ' || true)
        echo "changed_laws=$CHANGED" >> "$GITHUB_OUTPUT"

    # Commit changes and create per-law tags (law/{slug}/{date}).
    # Tags enable historical version lookup in the web app via /@{date}/ URLs.
    - name: Commit & tag
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Skip if no files changed
        if git diff --quiet && git diff --cached --quiet; then
          echo "No changes"
          exit 0
        fi

        DATE=$(date -u +%Y-%m-%d)
        git add -A
        git commit -m "sync: $DATE"

        # Tag only laws that actually changed
        for SLUG in ${{ steps.sync.outputs.changed_laws }}; do
          TAG="law/${SLUG}/${DATE}"
          git tag "$TAG" || true
          echo "Tagged: $TAG"
        done

        git push
        git push --tags

    # Trigger a Vercel redeploy so the web app picks up the new content.
    # Only fires if there were actual changes (not on no-op syncs).
    - name: Trigger deploy
      if: inputs.deploy-hook != ''
      shell: bash
      run: |
        if ! git diff --quiet HEAD~1 HEAD 2>/dev/null; then
          curl -s -X POST "${{ inputs.deploy-hook }}"
          echo "Deploy hook triggered"
        fi
